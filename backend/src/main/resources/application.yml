spring:
  application:
    name: contextpilot-backend
  servlet:
    multipart:
      max-file-size: ${DOCUMENT_MAX_FILE_SIZE:20MB}
      max-request-size: ${DOCUMENT_MAX_REQUEST_SIZE:21MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:15432/context_pilot}
    username: ${DB_USERNAME:context_pilot}
    password: ${POSTGRES_PASSWORD:context_pilot_local_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
      embedding: ${SPRING_AI_EMBEDDING_MODEL:none}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024
    vectorstore:
      type: ${SPRING_AI_VECTOR_STORE:none}
      pgvector:
        initialize-schema: false
        schema-validation: true
        schema-name: public
        table-name: vector_store
        id-type: UUID
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

contextpilot:
  storage:
    # Relative paths are resolved from the backend process working directory.
    root: ${STORAGE_ROOT:../data/uploads}
    max-file-size: ${DOCUMENT_MAX_FILE_SIZE:20MB}

server:
  port: ${SERVER_PORT:18080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
