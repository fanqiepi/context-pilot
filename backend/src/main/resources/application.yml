spring:
  application:
    name: contextpilot-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:15432/context_pilot}
    username: ${DB_USERNAME:context_pilot}
    password: ${POSTGRES_PASSWORD:context_pilot_local_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
      embedding: ${SPRING_AI_EMBEDDING_MODEL:none}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
